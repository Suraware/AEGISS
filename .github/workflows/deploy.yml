name: Deploy to ECR

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Images
        run: |
          services=("auth-service" "user-service" "alert-service" "health-service" "analytics-service")
          for service in "${services[@]}"; do
            echo "Building $service..."
            docker build -t ${{ steps.login-ecr.outputs.registry }}/aegis-$service:latest ./services/$service
            docker push ${{ steps.login-ecr.outputs.registry }}/aegis-$service:latest
          done
